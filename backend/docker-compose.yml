version: '3.9'

services:
  postgres:
    image: postgis/postgis:16-3.4-alpine
    container_name: dawwar_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: dawwar
      POSTGRES_PASSWORD: dawwar_dev_2024
      POSTGRES_DB: dawwar_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U dawwar -d dawwar_db']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dawwar_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
